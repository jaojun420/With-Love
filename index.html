<!DOCTYPE html>
<html>
<head>
<title>Are You Ready? 💖</title>

<style>
body {
  margin: 0;
  padding: 0;
  font-family: Arial;
  text-align: center;
  color: white;
  background: black;
  overflow: hidden;
}

.container {
  margin-top: 100px;
}

button {
  padding: 15px 25px;
  margin: 10px;
  font-size: 18px;
  border: none;
  border-radius: 25px;
  cursor: pointer;
}

.yes {
  background: #ff4d6d;
  color: white;
}

.no {
  background: #444;
  color: white;
}

.back {
  background: white;
  color: black;
}

img {
  margin-top: 30px;
  width: 300px;
  border-radius: 20px;
}

.hidden {
  display: none;
  font-size: 24px;
  margin-top: 20px;
}

/* 💖 HEART STYLES */
.heart {
  position: fixed;
  bottom: -20px;
  color: #ff4d6d;
  font-size: 20px;
  animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
  0% {
    transform: translateY(0) scale(1);
    opacity: 1;
  }
  100% {
    transform: translateY(-800px) scale(1.5);
    opacity: 0;
  }
}
</style>

</head>

<body>

<!-- START SCREEN -->
<div class="container" id="start">
  <h1>Are you ready to join?? 😏💖</h1>

  <button class="yes" onclick="yesClicked()">Yes ❤️</button>
  <button class="no" onclick="noClicked()">No 😡</button>
</div>

<!-- YES SECTION -->
<div id="yesSection" class="hidden">
  <h1>ILYOUUUUU SOOOOO MUCHHHH MY CUTEEE DARSHUUUUUUUUUU!!!!! 💖💖💖</h1>
  <p>❤️❤️❤️❤️❤️❤️❤️❤️❤️</p>
  <img src="yes.jpg.jpeg">
</div>

<!-- NO SECTION -->
<div id="noSection" class="hidden">
  <h1>DON'T YOU DARE!!!!! 😡🔥</h1>
  <img src="no.jpg.jpeg"><br><br>

  <button class="back" onclick="goBack()">Okay okay 😭 take me back</button>
</div>

<!-- SOUND -->
<audio id="noSound">
  <source src="no.mp3.mp3" type="audio/mpeg">
</audio>

<script>
function yesClicked() {
  document.getElementById("start").style.display = "none";
  document.getElementById("yesSection").style.display = "block";

  startHearts(); // 💖 start hearts
}

function noClicked() {
  document.getElementById("start").style.display = "none";
  document.getElementById("noSection").style.display = "block";

  var sound = document.getElementById("noSound");
  sound.play();
}

function goBack() {
  document.getElementById("noSection").style.display = "none";
  document.getElementById("start").style.display = "block";
}

/* 💖 HEART FUNCTION */
function startHearts() {
  setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.fontSize = (15 + Math.random() * 20) + "px";

    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 5000);
  }, 300);
}
</script>

</body>
</html>
