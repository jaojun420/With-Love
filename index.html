
<!DOCTYPE html>
<html>
<head>
<title>Are You Ready? 💖</title>

<style>
body {
  margin: 0;
  padding: 0;
  font-family: Arial;
  background: black;
  color: white;
  overflow: hidden;
}

/* 💖 START SCREEN CENTER BOX */
.center-screen {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  text-align: center;
  background: rgba(255, 255, 255, 0.1);
  padding: 40px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 20px rgba(255, 77, 109, 0.6);
}

/* 💖 FULLSCREEN SECTIONS */
.fullscreen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;

  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

/* 💖 BUTTONS */
button {
  padding: 15px 25px;
  margin: 10px;
  font-size: 18px;
  border: none;
  border-radius: 25px;
  cursor: pointer;
}

.yes {
  background: #ff4d6d;
  color: white;
}

.no {
  background: #444;
  color: white;
}

.back {
  background: white;
  color: black;
}

/* 💖 IMAGE */
img {
  margin-top: 30px;
  width: 300px;
  border-radius: 20px;
}

/* 💖 HEARTS */
.heart {
  position: fixed;
  bottom: -20px;
  color: #ff4d6d;
  font-size: 20px;
  animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
  0% {
    transform: translateY(0) scale(1);
    opacity: 1;
  }
  100% {
    transform: translateY(-800px) scale(1.5);
    opacity: 0;
  }
}
</style>
</head>

<body>

<!-- 💖 START SCREEN -->
<div id="start" class="center-screen">
  <div class="container">
    <h1>Are you ready to join?? 😏💖</h1>

    <button class="yes" onclick="yesClicked()">Yes ❤️</button>
    <button class="no" onclick="noClicked()">No 😡</button>
  </div>
</div>

<!-- 💖 YES SECTION -->
<div id="yesSection" class="fullscreen">
  <h1>ILYOUUUUU SOOOOO MUCHHHH MY CUTEEE DARSHUUUUUUUUUU!!!!! 💖💖💖</h1>
  <p>❤️❤️❤️❤️❤️❤️❤️❤️❤️</p>
  <img src="yes.jpg.jpeg">
</div>

<!-- 💖 NO SECTION -->
<div id="noSection" class="fullscreen">
  <h1>DON'T YOU DARE!!!!! 😡🔥</h1>
  <img src="no.jpg.jpeg"><br><br>

  <button class="back" onclick="goBack()">Okay okay 😭 take me back</button>
</div>

<!-- 💖 SOUND -->
<audio id="noSound">
  <source src="no.mp3.mp3" type="audio/mpeg">
</audio>
  <audio id="yesSound">
  <source src="yes.mp3.mp3" type="audio/mpeg">
</audio>

<script>
function yesClicked() {
  document.getElementById("start").style.display = "none";
  document.getElementById("yesSection").style.display = "flex";

  startHearts();
}

function noClicked() {
  document.getElementById("start").style.display = "none";
  document.getElementById("noSection").style.display = "flex";

  document.getElementById("noSound").play();
}

function goBack() {
  document.getElementById("noSection").style.display = "none";
  document.getElementById("start").style.display = "flex";
}

function startHearts() {
  setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.fontSize = (15 + Math.random() * 20) + "px";

    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 5000);
  }, 300);
}
</script>

</body>
</html>
